<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Upload</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 60px auto;
      padding: 0 20px;
      background: #f5f5f5;
    }
    h1 { margin-bottom: 24px; }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 32px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    input[type="file"] {
      display: block;
      margin: 16px 0;
    }
    button {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover { background: #1d4ed8; }
    .messages { margin-bottom: 16px; }
    .message {
      padding: 10px 16px;
      border-radius: 6px;
      margin-bottom: 8px;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }
    .message.error {
      background: #fee2e2;
      color: #991b1b;
      border-color: #fecaca;
    }
  </style>
</head>
<body>
  <h1>Image Upload</h1>
  <div class="card">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="messages">
          {% for msg in messages %}
            <div class="message {% if 'Invalid' in msg or 'No file' in msg %}error{% endif %}">{{ msg }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" enctype="multipart/form-data">
      <label for="file">Select an image to upload:</label>
      <input type="file" id="file" name="file" accept="image/*">
      <button type="submit">Upload</button>
    </form>
  </div>
</body>
</html>
